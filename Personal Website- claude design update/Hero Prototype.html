<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saqlain Momin — Personal Site Prototype</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow-x: hidden; }
    #root { min-height: 100vh; }

    :root {
      --f-serif: 'IBM Plex Serif', Georgia, serif;
      --f-sans:  'IBM Plex Sans', system-ui, sans-serif;
      --f-mono:  'IBM Plex Mono', monospace;
    }

    /* ======== PAGE CROSSFADE OVERLAY ======== */
    @keyframes overlay-out {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    .page-overlay {
      position: fixed; inset: 0; z-index: 90; pointer-events: none;
      animation: overlay-out 380ms cubic-bezier(.4,0,.2,1) forwards;
    }

    /* ======== NAV ======== */
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(24px, 5vw, 64px); border-bottom: 1px solid;
      transform: translateY(-100%);
      transition: transform 380ms cubic-bezier(.4,0,.2,1);
    }
    .site-nav.visible { transform: translateY(0); }
    .nav-brand { font-family: var(--f-mono); font-size: 16px; font-weight: 600; letter-spacing: 0.06em; }
    .nav-links { display: flex; gap: 28px; font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
    .nav-link  { text-decoration: none; }
    .nav-link:hover { opacity: 0.75; }

    /* ======== HERO ======== */
    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 clamp(24px, 5vw, 64px); }
    .hero-inner { max-width: 1080px; margin: 0 auto; width: 100%; }
    .eyebrow { font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 28px; }
    .hero-name { font-size: clamp(52px, 8.5vw, 118px); font-weight: 600; line-height: 0.92; letter-spacing: -0.03em; margin-bottom: clamp(24px, 3.5vw, 44px); }
    .headline  { font-size: clamp(22px, 3vw, 38px); line-height: 1.18; letter-spacing: -0.012em; max-width: 24ch; margin-bottom: clamp(16px, 2vw, 24px); }
    .sub { max-width: 40ch; margin-bottom: clamp(40px, 6vh, 72px); }
    .sub-a { font-family: var(--f-serif); font-size: clamp(16px, 1.8vw, 20px); line-height: 1.55; }
    .sub-b { font-family: var(--f-mono); font-size: clamp(13px, 1.4vw, 16px); line-height: 1.7; }

    /* ======== LENS TOGGLE ======== */
    .lens-wrap {
      display: inline-flex; align-items: stretch; position: relative;
      overflow: hidden; outline: none; user-select: none; border: 1px solid;
    }
    .lens-wrap:focus-visible { box-shadow: 0 0 0 2px currentColor; }
    .lens-ind  { position: absolute; top: 0; bottom: 0; width: 50%; opacity: 0.08; pointer-events: none; }
    .lens-seam { width: 1px; align-self: stretch; }
    .lens-btn  { padding: 10px 22px; cursor: pointer; border: 0; background: transparent; font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
    .lens-hint { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); font-family: var(--f-mono); font-size: 10px; white-space: nowrap; opacity: 0.6; pointer-events: none; }

    /* ======== BELOW FOLD ======== */
    .below-fold { padding: clamp(64px, 10vh, 120px) clamp(24px, 5vw, 64px) clamp(80px, 14vh, 160px); }
    .below-inner { max-width: 1080px; margin: 0 auto; }
    .sec-label { font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 20px; }
    .sec-heading { font-size: clamp(26px, 3.6vw, 44px); font-weight: 600; line-height: 1.08; letter-spacing: -0.02em; max-width: 20ch; margin-bottom: 48px; }
    .work-row { padding: 20px 0; display: flex; justify-content: space-between; align-items: baseline; gap: 16px; border-top: 1px solid; }
    .work-title { font-size: clamp(16px, 2vw, 20px); font-weight: 500; }
    .work-meta { font-family: var(--f-mono); font-size: 12px; flex-shrink: 0; }
    .work-end { border-top: 1px solid; }

    :focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }
    :focus:not(:focus-visible) { outline: none; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 4px; }

    @media (prefers-reduced-motion: reduce) {
      .page-overlay { animation: none; opacity: 0; }
      .site-nav { transition: none; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    /* ======== PALETTES ======== */
    const PAL = {
      auditor: { bg:'#f3f3f1', fg:'#1a1a17', dim:'#55534d', accent:'#0e6b5e', line:'#d5d4ce' },
      builder: { bg:'#0c0e13', fg:'#e3e8ee', dim:'#8a97a8', accent:'#6ea8fe', line:'#1e2530' },
    };
    const COPY = {
      name: 'Saqlain Momin',
      headline: 'I see risk at the enterprise level, and I build the tools to close the gaps I find.',
      auditor: { eyebrow:'Cyber Strategy & Governance', sub:'Four years auditing controls at enterprise scale\u2009—\u2009I know why a control exists, not just that someone ticked the box.' },
      builder: { eyebrow:'Build & Ship', sub:'Async Python, FastAPI, the Anthropic SDK, Swift, n8n. Understand by shipping.' },
    };
    const WORK = [
      { a:'Global SOX ITGC Assessment', b:'Automated Control Testing Pipeline', year:'2024' },
      { a:'Cloud Security Posture Review', b:'FastAPI Audit Dashboard', year:'2023' },
      { a:'Third-Party Vendor Risk Framework', b:'n8n GRC Automation Flows', year:'2023' },
    ];

    /* ======== CROSSFADE OVERLAY ======== */
    function PageOverlay({ prevBg, counter }) {
      if (!prevBg) return null;
      return <div className="page-overlay" key={counter} style={{ backgroundColor: prevBg }}></div>;
    }

    /* ======== LENS TOGGLE ======== */
    function LensToggle({ reading, p, onSwitch }) {
      const isA = reading === 'auditor';
      const [focused, setFocused] = useState(false);
      const onKey = useCallback((e) => {
        if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); onSwitch('auditor'); }
        else if (e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); onSwitch('builder'); }
      }, [onSwitch]);

      return (
        <div className="lens-wrap" role="slider" tabIndex={0}
          aria-label="Reading lens" aria-valuemin={0} aria-valuemax={1}
          aria-valuenow={isA?0:1} aria-valuetext={`${reading} reading`}
          onKeyDown={onKey} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
          style={{ borderColor: p.line }}>
          <div className="lens-ind" style={{ left: isA?0:'50%', backgroundColor: p.accent }}></div>
          <button className="lens-btn" onClick={()=>onSwitch('auditor')}
            style={{ color: isA?p.accent:p.dim, opacity: isA?1:0.5 }}>Auditor</button>
          <div className="lens-seam" style={{ backgroundColor: p.line }}></div>
          <button className="lens-btn" onClick={()=>onSwitch('builder')}
            style={{ color: isA?p.dim:p.accent, opacity: isA?0.5:1 }}>Builder</button>
          {focused && <span className="lens-hint" style={{ color: p.dim }}>← →</span>}
        </div>
      );
    }

    /* ======== HERO ======== */
    function HeroSection({ reading, p, onSwitch }) {
      const isA = reading === 'auditor';
      return (
        <section className="hero" data-screen-label="Hero"
          style={{ backgroundColor: p.bg, color: p.fg }}>
          <div className="hero-inner">
            <p className="eyebrow" style={{ color: p.accent }}>{COPY[reading].eyebrow}</p>
            <h1 className="hero-name" style={{ fontFamily: isA ? 'var(--f-serif)' : 'var(--f-sans)' }}>
              {COPY.name}
            </h1>
            <h2 className="headline" style={{ fontFamily: isA ? 'var(--f-serif)' : 'var(--f-sans)', fontWeight: isA?500:400 }}>
              {COPY.headline}
            </h2>
            <p className={isA ? 'sub sub-a' : 'sub sub-b'} style={{ color: p.dim }}>
              {COPY[reading].sub}
            </p>
            <LensToggle reading={reading} p={p} onSwitch={onSwitch} />
          </div>
        </section>
      );
    }

    /* ======== NAV ======== */
    function SiteNav({ p, visible }) {
      return (
        <nav className={`site-nav ${visible?'visible':''}`}
          style={{ backgroundColor: p.bg, borderColor: p.line }}>
          <span className="nav-brand" style={{ color: p.fg }}>SM</span>
          <div className="nav-links">
            {['The Work','Field Notes','Contact'].map(l=>(
              <a key={l} className="nav-link" href="#" onClick={e=>e.preventDefault()}
                style={{ color: p.dim }}>{l}</a>
            ))}
          </div>
        </nav>
      );
    }

    /* ======== BELOW FOLD ======== */
    function BelowFold({ reading, p }) {
      const isA = reading === 'auditor';
      return (
        <section className="below-fold" data-screen-label="The Work"
          style={{ backgroundColor: p.bg, color: p.fg }}>
          <div className="below-inner">
            <p className="sec-label" style={{ color: p.accent }}>The Work</p>
            <h2 className="sec-heading" style={{ fontFamily: isA ? 'var(--f-serif)' : 'var(--f-sans)' }}>
              {isA ? 'Control assessments that changed how leadership saw risk.' : 'Tools shipped to close gaps faster.'}
            </h2>
            <div>
              {WORK.map((item,i)=>(
                <div className="work-row" key={i} style={{ borderColor: p.line }}>
                  <span className="work-title" style={{ fontFamily: isA ? 'var(--f-serif)' : 'var(--f-sans)' }}>
                    {isA ? item.a : item.b}
                  </span>
                  <span className="work-meta" style={{ color: p.dim }}>{item.year}</span>
                </div>
              ))}
              <div className="work-end" style={{ borderColor: p.line }}></div>
            </div>
          </div>
        </section>
      );
    }

    /* ======== APP ======== */
    function App() {
      const [reading, setReading] = useState('auditor');
      const [overlay, setOverlay] = useState({ bg: null, count: 0 });
      const [navVis, setNavVis] = useState(false);
      const heroRef = useRef(null);
      const prevReadingRef = useRef(reading);

      const switchReading = useCallback((next) => {
        if (next === prevReadingRef.current) return;
        const oldBg = PAL[prevReadingRef.current].bg;
        setOverlay(o => ({ bg: oldBg, count: o.count + 1 }));
        prevReadingRef.current = next;
        setReading(next);
      }, []);

      useEffect(() => {
        const el = heroRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => setNavVis(!e.isIntersecting), { threshold: 0.05 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      const p = PAL[reading];

      return (
        <div>
          <PageOverlay prevBg={overlay.bg} counter={overlay.count} />
          <SiteNav p={p} visible={navVis} />
          <div ref={heroRef}>
            <HeroSection reading={reading} p={p} onSwitch={switchReading} />
          </div>
          <BelowFold reading={reading} p={p} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
